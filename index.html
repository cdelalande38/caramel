<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#fbcfe8">
<title>La course de Caramel 🐴</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'Segoe UI Rounded','Comic Sans MS','Segoe UI',Verdana,sans-serif;
    min-height:100vh; color:#5b3a29;
    background:linear-gradient(180deg,#fff1f5 0%,#fef3e2 60%,#fdeef7 100%);
  }
  .screen { display:none; max-width:640px; margin:0 auto; padding:16px 14px 40px; }
  .screen.active { display:block; animation:pop .3s ease; }
  @keyframes pop { from{opacity:0; transform:scale(.97);} to{opacity:1; transform:scale(1);} }

  header { text-align:center; margin:12px 0 4px; }
  h1 { font-size:1.8rem; color:#b45309; }
  .subtitle { text-align:center; color:#9d6b53; margin-bottom:8px; font-size:1.02rem; }
  #total-stars { text-align:center; font-size:1.2rem; margin-bottom:16px; color:#b45309; font-weight:700; }

  .story-card {
    display:flex; align-items:center; gap:12px;
    background:#fff; border:3px solid #fbcfe8; border-radius:22px;
    padding:14px 16px; margin-bottom:12px; cursor:pointer;
    box-shadow:0 4px 14px rgba(180,83,9,.08); transition:transform .12s;
  }
  .story-card:active { transform:scale(.98); }
  .story-card .emoji { font-size:2.2rem; }
  .story-card .mid { flex:1; }
  .story-card .title { font-size:1.12rem; font-weight:700; }
  .story-card .pace { font-size:.85rem; color:#9d6b53; }
  .story-card .stars { font-size:1rem; letter-spacing:2px; }

  .back { background:none; border:none; color:#b45309; font-size:1.02rem; cursor:pointer; margin-bottom:6px; }

  /* ===== Piste de course ===== */
  .track {
    position:relative; height:96px; border-radius:20px; overflow:hidden;
    background:linear-gradient(180deg,#bae6fd 0%,#bae6fd 55%,#86efac 55%,#4ade80 100%);
    box-shadow:inset 0 2px 8px rgba(0,0,0,.08); margin-bottom:6px;
  }
  #pony { position:absolute; bottom:4px; left:0; font-size:2.3rem; transition:left .35s ease; z-index:2; }
  #pony.hop { animation:hop .3s ease; }
  #pony.stumble { animation:stumble .4s ease; }
  @keyframes hop { 50%{ transform:translateY(-16px);} }
  @keyframes stumble { 25%{transform:rotate(-12deg);} 75%{transform:rotate(10deg);} }
  #fly { position:absolute; top:6px; left:0; font-size:1.6rem; transition:left .25s linear; z-index:1; }
  .finish { position:absolute; right:4px; bottom:6px; font-size:2rem; }
  #spark { position:absolute; bottom:38px; font-size:1.1rem; display:none; z-index:2; }

  .race-info { display:flex; justify-content:space-between; align-items:center;
               font-size:.95rem; color:#9d6b53; font-weight:700; margin-bottom:10px; padding:0 4px; }

  .story-head { text-align:center; font-size:1.15rem; font-weight:700; margin:2px 0 8px; color:#b45309; }
  #text-display {
    background:#fff; border-radius:22px; padding:20px 18px;
    font-size:1.5rem; line-height:2.35; color:#3f2d20;
    box-shadow:0 6px 18px rgba(180,83,9,.12);
  }
  .word { padding:2px 5px; border-radius:8px; }
  .word.current { background:#fde68a; box-shadow:0 0 0 3px #f59e0b; animation:pulse 1.2s infinite; }
  .word.read   { background:#bbf7d0; color:#14532d; }
  .word.missed { background:#fed7aa; color:#7c2d12; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 3px #f59e0b;} 50%{box-shadow:0 0 0 6px #f59e0b55;} }

  .mic-zone { text-align:center; margin-top:18px; }
  #btn-mic {
    width:100px; height:100px; border-radius:50%; border:none; cursor:pointer;
    font-size:2.7rem; color:#fff;
    background:linear-gradient(145deg,#f472b6,#c084fc);
    box-shadow:0 8px 20px rgba(196,132,252,.45); transition:transform .12s;
  }
  #btn-mic:active { transform:scale(.94); }
  #btn-mic.listening { animation:micpulse 1.3s infinite; }
  @keyframes micpulse { 0%,100%{box-shadow:0 8px 20px rgba(196,132,252,.45);} 50%{box-shadow:0 0 0 16px rgba(244,114,182,.25);} }
  .mic-label { margin-top:8px; font-size:1.05rem; font-weight:700; color:#9d6b53; min-height:1.4em; }
  #heard { font-size:.85rem; color:#b9a394; min-height:1.3em; margin-top:4px; font-style:italic; }
  .quit { background:none; border:none; color:#b98a6f; font-size:.95rem; margin-top:12px; cursor:pointer; text-decoration:underline; }

  .results-box { background:#fff; border-radius:22px; padding:26px 18px; text-align:center;
                 box-shadow:0 6px 18px rgba(180,83,9,.12); }
  .big-stars { font-size:3.4rem; letter-spacing:6px; margin:4px 0 12px; animation:pop .4s ease; }
  #res-message { font-size:1.2rem; font-weight:700; color:#5b3a29; margin-bottom:8px; }
  #res-race { font-size:1.05rem; color:#7c5843; margin-bottom:8px; }
  #res-speed { font-size:.92rem; color:#9d6b53; }
  #missed-words { margin-top:12px; font-size:1.02rem; color:#7c2d12; }
  .btn {
    display:inline-block; border:none; cursor:pointer; margin:8px 4px 0;
    padding:13px 24px; border-radius:999px; font-size:1.05rem; font-weight:700;
    background:#fbbf24; color:#78350f; box-shadow:0 4px 10px rgba(180,83,9,.25);
  }
  .btn.secondary { background:#fce7f3; color:#9d174d; }
  .warn { background:#fee2e2; color:#7f1d1d; padding:12px 16px; border-radius:14px;
          margin-top:14px; text-align:center; display:none; font-size:.98rem; }
</style>
</head>
<body>

<!-- ACCUEIL -->
<div id="screen-home" class="screen active">
  <header><h1>🐴 La course de Caramel</h1></header>
  <p class="subtitle">Lis vite et bien pour gagner la course contre Zip le papillon !</p>
  <p id="total-stars">⭐ 0</p>
  <div id="story-list"></div>
  <div class="warn" id="compat-warn"></div>
</div>

<!-- COURSE / LECTURE -->
<div id="screen-read" class="screen">
  <button class="back" onclick="stopAll(); show('screen-home'); renderHome();">← Retour</button>
  <div class="story-head" id="read-title"></div>
  <div class="track">
    <span id="fly">🦋</span>
    <span id="spark">✨</span>
    <span id="pony">🐴</span>
    <span class="finish">🏁</span>
  </div>
  <div class="race-info">
    <span id="streak">🔥 série : 0</span>
    <span id="timer">⏱ 0 s</span>
  </div>
  <div id="text-display"></div>
  <div class="mic-zone">
    <button id="btn-mic" onclick="micTap()">🎤</button>
    <p class="mic-label" id="mic-label">Appuie sur le micro et lis !</p>
    <p id="heard"></p>
    <button class="quit" id="btn-quit" onclick="finishExercise()" style="display:none">J'ai fini de lire</button>
  </div>
</div>

<!-- RÉSULTATS -->
<div id="screen-results" class="screen">
  <div class="results-box">
    <div class="big-stars" id="res-stars"></div>
    <p id="res-message"></p>
    <p id="res-race"></p>
    <p id="res-speed"></p>
    <p id="missed-words"></p>
  </div>
  <div style="text-align:center; margin-top:14px;">
    <button class="btn" onclick="openStory(currentIdx)">🔄 Revanche</button>
    <button class="btn" id="btn-next" onclick="nextStory()">➡️ Suite</button>
    <button class="btn secondary" onclick="show('screen-home'); renderHome();">🏠 Histoires</button>
  </div>
</div>

<script>
/* ============ HISTOIRES (sans apostrophes : contrainte reco vocale) ============ */
/* target = vitesse du papillon Zip en mots/minute (progressif, adapté CE2) */
const STORIES = [
  { emoji:'🍎', title:'Caramel le poney', target:40, best:0,
    text:"Léa arrive à la ferme ce matin. Son poney Caramel attend près de la barrière. Elle le brosse doucement et lui donne une pomme bien rouge. Caramel remue la queue car il est content. Ensuite, Léa pose la selle et met son casque pour la promenade." },
  { emoji:'🌳', title:'Promenade en forêt', target:48, best:0,
    text:"Ce matin, Léa monte sur Caramel pour une balade dans la forêt. Les oiseaux chantent et les feuilles dansent avec le vent. Le poney trotte sur le petit chemin plein de fleurs. Soudain, un lapin gris traverse devant eux. Caramel reste très calme et Léa le félicite avec une caresse." },
  { emoji:'🏆', title:'Le grand concours', target:56, best:0,
    text:"Dimanche, le grand jour arrive enfin : le concours du club. Léa respire un grand coup, elle a un peu peur. Caramel avance vers le premier obstacle et saute très haut. Le public applaudit fort. À la fin du parcours, Léa reçoit un joli ruban bleu. Elle serre son poney dans ses bras car ils forment une belle équipe." },
  { emoji:'🧚', title:'La fée des chevaux', target:64, best:0,
    text:"Cette nuit, une fée entre sans bruit dans la petite écurie. Elle touche la crinière de Caramel avec sa baguette magique. Le poney brille comme une étoile et des ailes dorées poussent sur son dos. Il vole très haut dans le ciel plein de nuages roses. Au matin, Léa trouve une plume dorée posée sur la paille." }
];
const PACE_LABEL = t => t<=42 ? '🦋 lent' : t<=50 ? '🦋 moyen' : t<=58 ? '🦋 rapide' : '🦋 très rapide';

/* ============ ÉTAT ============ */
let currentIdx = 0, wordEls = [], recognition = null, raceTimer = null, audioCtx = null;
const state = { target:[], status:[], progress:0, startTime:null, running:false,
                finalTranscript:'', streak:0, flyDone:false, childFinished:false };

/* ============ SONS (WebAudio, aucun fichier) ============ */
function beep(freq, dur=0.08, gain=0.12){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.frequency.value = freq; g.gain.value = gain;
    o.connect(g); g.connect(audioCtx.destination); o.start();
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.stop(audioCtx.currentTime + dur);
  }catch(_){}
}
function fanfare(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18,0.15), i*140)); }

/* ============ NAVIGATION ============ */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function renderHome(){
  const total = STORIES.reduce((a,s)=>a+s.best,0);
  document.getElementById('total-stars').textContent = '⭐ ' + total;
  const box = document.getElementById('story-list');
  box.innerHTML = '';
  STORIES.forEach((s,i)=>{
    const c = document.createElement('div');
    c.className = 'story-card';
    c.innerHTML = `<span class="emoji">${s.emoji}</span>
      <span class="mid"><span class="title">${s.title}</span><br>
      <span class="pace">${PACE_LABEL(s.target)}</span></span>
      <span class="stars">${'⭐'.repeat(s.best)}${'☆'.repeat(3-s.best)}</span>`;
    c.onclick = ()=>openStory(i);
    box.appendChild(c);
  });
}

/* ============ EXERCICE ============ */
function normalize(w){
  return w.toLowerCase().normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
}
function tokenize(text){
  return text.split(/\s+/).map(raw=>({raw, norm:normalize(raw)})).filter(w=>w.norm.length>0);
}
function openStory(i){
  stopAll();
  currentIdx = i;
  const s = STORIES[i];
  Object.assign(state, { target:tokenize(s.text), progress:0, startTime:null,
    running:false, finalTranscript:'', streak:0, flyDone:false, childFinished:false });
  state.status = new Array(state.target.length).fill('pending');

  document.getElementById('read-title').textContent = s.emoji + ' ' + s.title + ' — bats Zip 🦋 !';
  const disp = document.getElementById('text-display');
  disp.innerHTML = '';
  wordEls = state.target.map(w=>{
    const sp = document.createElement('span');
    sp.className = 'word'; sp.textContent = w.raw;
    disp.appendChild(sp); disp.appendChild(document.createTextNode(' '));
    return sp;
  });
  renderText();
  moveActor('pony', 0); moveActor('fly', 0);
  document.getElementById('streak').textContent = '🔥 série : 0';
  document.getElementById('timer').textContent = '⏱ 0 s';
  document.getElementById('mic-label').textContent = 'Appuie sur le micro et lis !';
  document.getElementById('heard').textContent = '';
  document.getElementById('btn-mic').classList.remove('listening');
  document.getElementById('btn-quit').style.display = 'none';
  document.getElementById('spark').style.display = 'none';
  show('screen-read');
}
function moveActor(id, pct){
  document.getElementById(id).style.left = (Math.min(pct,100) * 0.85) + '%';
  if(id==='pony'){
    const sp = document.getElementById('spark');
    sp.style.left = (Math.min(pct,100) * 0.85) + '%';
  }
}

/* ============ RECONNAISSANCE VOCALE ============ */
const ERR_MSG = {
  'not-allowed': 'Micro refusé 😕 Autorise-le : icône 🔒 à côté de l\u2019adresse → Micro → Autoriser.',
  'service-not-allowed': 'La reconnaissance est bloquée ici. Ouvre le lien directement dans Chrome (pas depuis une autre appli).',
  'network': 'La reconnaissance a besoin d\u2019internet. Vérifie la connexion 📶',
  'audio-capture': 'Aucun micro détecté sur cet appareil 🎙️',
  'language-not-supported': 'Le français n\u2019est pas disponible sur ce navigateur.'
};
function micTap(){
  if(state.running) return;
  beep(660, 0.06); // initialise aussi l'audio sur le geste utilisateur
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ showCompat(); show('screen-home'); return; }

  recognition = new SR();
  recognition.lang = 'fr-FR';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = ()=>{
    document.getElementById('mic-label').textContent = 'Je t\u2019écoute... lis l\u2019histoire ! 🎧';
  };
  recognition.onresult = (e)=>{
    let interim = '';
    for(let i=e.resultIndex; i<e.results.length; i++){
      if(e.results[i].isFinal) state.finalTranscript += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript + ' ';
    }
    const all = state.finalTranscript + ' ' + interim;
    const tail = all.trim().split(/\s+/).slice(-6).join(' ');
    document.getElementById('heard').textContent = tail ? '👂 ' + tail : '';
    processTranscript(all);
  };
  recognition.onerror = (e)=>{
    const msg = ERR_MSG[e.error];
    if(msg){ document.getElementById('mic-label').textContent = msg; }
    /* 'no-speech' et 'aborted' : silencieux, le redémarrage automatique gère */
  };
  recognition.onend = ()=>{
    if(state.running){ setTimeout(()=>{ try{ recognition.start(); }catch(_){} }, 200); }
  };

  state.running = true;
  try{ recognition.start(); }
  catch(err){ document.getElementById('mic-label').textContent = 'Impossible de démarrer le micro. Recharge la page.'; return; }
  document.getElementById('btn-mic').classList.add('listening');
  document.getElementById('btn-quit').style.display = 'inline-block';

  raceTimer = setInterval(()=>{
    if(!state.startTime) return;
    const elapsed = (Date.now() - state.startTime) / 1000;
    document.getElementById('timer').textContent = '⏱ ' + Math.round(elapsed) + ' s';
    /* Zip avance à la vitesse cible */
    const flyWords = (elapsed/60) * STORIES[currentIdx].target;
    const flyPct = 100 * flyWords / state.target.length;
    moveActor('fly', flyPct);
    if(flyPct >= 100 && !state.flyDone){ state.flyDone = true; }
  }, 250);
}
function showCompat(){
  const w = document.getElementById('compat-warn');
  w.style.display = 'block';
  w.innerHTML = 'Ce navigateur ne connaît pas la reconnaissance vocale.<br>Utilise <b>Chrome sur Android ou sur ordinateur</b> 😊';
}

/* Alignement tolérant : fenêtre de 4 mots + Levenshtein ≤ 1 */
function processTranscript(spoken){
  const spokenWords = spoken.split(/\s+/).map(normalize).filter(Boolean);
  const n = state.target.length;
  const status = new Array(n).fill('pending');
  let ti = 0;
  for(const sw of spokenWords){
    if(ti >= n) break;
    let found = -1;
    for(let k=ti; k<Math.min(ti+4,n); k++){
      if(isMatch(sw, state.target[k].norm)){ found=k; break; }
    }
    if(found >= 0){
      for(let k=ti; k<found; k++) status[k]='missed';
      status[found]='read';
      ti = found+1;
    }
  }
  const prevProgress = state.progress;
  const prevMissed = state.status.filter(s=>s==='missed').length;
  state.status = status; state.progress = ti;
  if(!state.startTime && ti>0) state.startTime = Date.now();

  /* série de mots réussis consécutifs */
  let streak = 0;
  for(let k=ti-1; k>=0 && status[k]==='read'; k--) streak++;
  state.streak = streak;
  document.getElementById('streak').textContent = '🔥 série : ' + streak;
  document.getElementById('spark').style.display = streak >= 5 ? 'block' : 'none';

  /* animations + sons */
  const pony = document.getElementById('pony');
  if(ti > prevProgress){
    moveActor('pony', 100*ti/n);
    pony.classList.remove('hop'); void pony.offsetWidth; pony.classList.add('hop');
    beep(440 + Math.min(streak,10)*40, 0.05, 0.08);
  }
  const nowMissed = status.filter(s=>s==='missed').length;
  if(nowMissed > prevMissed){
    pony.classList.remove('stumble'); void pony.offsetWidth; pony.classList.add('stumble');
    beep(180, 0.12, 0.06);
  }
  renderText();
  if(ti >= n && !state.childFinished){
    state.childFinished = true;
    setTimeout(finishExercise, 500);
  }
}
function isMatch(a,b){
  if(a===b) return true;
  return Math.min(a.length,b.length)>=4 && levenshtein(a,b)<=1;
}
function levenshtein(a,b){
  const m=a.length, n=b.length;
  const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=1;j<=n;j++) d[0][j]=j;
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    d[i][j]=Math.min(d[i-1][j]+1, d[i][j-1]+1, d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n];
}
function renderText(){
  state.target.forEach((_,i)=>{
    wordEls[i].className = 'word ' + state.status[i] +
      (i===state.progress && state.running ? ' current' : '');
  });
}

/* ============ FIN & ÉTOILES ============ */
function finishExercise(){
  if(!state.running) return;
  stopAll();
  const elapsedMs = state.startTime ? (Date.now()-state.startTime) : 0;
  const minutes = Math.max(elapsedMs/60000, 0.05);
  const correct = state.status.filter(s=>s==='read').length;
  const mclm = Math.round(correct/minutes);
  const precision = Math.round(100*correct/state.target.length);
  const beatFly = state.childFinished && !state.flyDone;
  const stars = (precision>=90 && beatFly) ? 3 : (precision>=75) ? 2 : 1;

  STORIES[currentIdx].best = Math.max(STORIES[currentIdx].best, stars);
  if(stars === 3) fanfare(); else beep(784, 0.2, 0.12);

  document.getElementById('res-stars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
  document.getElementById('res-race').textContent = beatFly
    ? '🏁 Caramel est arrivé avant Zip le papillon !'
    : '🦋 Zip est arrivé le premier cette fois... revanche ?';
  document.getElementById('res-message').textContent =
    stars===3 ? '🎉 Course parfaite ! Caramel est super fier de toi !' :
    stars===2 ? '💪 Très belle lecture ! Vise la victoire contre Zip pour la 3e étoile.' :
                '🌱 Bon début ! Relis cette histoire pour rattraper Zip.';
  document.getElementById('res-speed').textContent = 'Tu as lu ' + mclm + ' mots par minute ⏱️';

  const missed = state.target.filter((_,i)=>state.status[i]!=='read').map(w=>w.raw);
  document.getElementById('missed-words').innerHTML = missed.length
    ? 'Mots à apprivoiser : <b>' + missed.slice(0,6).join(' · ') + '</b>'
    : '💯 Tu as lu tous les mots !';
  document.getElementById('btn-next').style.display =
    currentIdx < STORIES.length-1 ? 'inline-block' : 'none';
  show('screen-results');
}
function nextStory(){ openStory(Math.min(currentIdx+1, STORIES.length-1)); }
function stopAll(){
  state.running = false;
  if(recognition){ try{ recognition.stop(); }catch(_){} recognition = null; }
  if(raceTimer){ clearInterval(raceTimer); raceTimer = null; }
  const mic = document.getElementById('btn-mic');
  if(mic) mic.classList.remove('listening');
}

/* ============ COMPATIBILITÉ AU CHARGEMENT ============ */
const ua = navigator.userAgent;
const isIOS = /iPad|iPhone|iPod/.test(ua) || (/(Macintosh)/.test(ua) && navigator.maxTouchPoints > 1);
if(!(window.SpeechRecognition || window.webkitSpeechRecognition)){
  showCompat();
} else if(isIOS){
  const w = document.getElementById('compat-warn');
  w.style.display = 'block';
  w.innerHTML = '📱 Sur iPhone/iPad, la reconnaissance vocale marche mal (elle ne suit pas les mots en direct).<br>Pour jouer vraiment, utilise <b>Chrome sur Android ou sur un ordinateur</b>.';
}
renderHome();
</script>
</body>
</html>
