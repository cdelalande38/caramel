<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#fbcfe8">
<title>La course de Caramel 🐴</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'Segoe UI Rounded','Comic Sans MS','Segoe UI',Verdana,sans-serif;
    min-height:100vh; color:#5b3a29;
    background:linear-gradient(180deg,#fff1f5 0%,#fef3e2 60%,#fdeef7 100%);
  }
  .screen { display:none; max-width:680px; margin:0 auto; padding:14px 12px 30px; }
  .screen.active { display:block; animation:pop .3s ease; }
  #screen-read.active { display:flex; flex-direction:column; height:100vh; height:100dvh;
                        overflow:hidden; padding-bottom:10px; }
  @keyframes pop { from{opacity:0; transform:scale(.97);} to{opacity:1; transform:scale(1);} }

  header { text-align:center; margin:10px 0 4px; }
  h1 { font-size:1.75rem; color:#b45309; }
  .subtitle { text-align:center; color:#9d6b53; margin-bottom:4px; font-size:1rem; }
  #engine-status { text-align:center; font-size:.82rem; color:#b9a394; margin-bottom:6px; min-height:1.2em; }
  #total-stars { text-align:center; font-size:1.2rem; margin-bottom:14px; color:#b45309; font-weight:700; }

  .story-card {
    display:flex; align-items:center; gap:12px;
    background:#fff; border:3px solid #fbcfe8; border-radius:22px;
    padding:14px 16px; margin-bottom:12px; cursor:pointer;
    box-shadow:0 4px 14px rgba(180,83,9,.08); transition:transform .12s;
  }
  .story-card:active { transform:scale(.98); }
  .story-card .emoji { font-size:2.2rem; }
  .story-card .mid { flex:1; }
  .story-card .title { font-size:1.12rem; font-weight:700; }
  .story-card .pace { font-size:.85rem; color:#9d6b53; }
  .story-card .stars { font-size:1rem; letter-spacing:2px; }

  .back { background:none; border:none; color:#b45309; font-size:1rem; cursor:pointer;
          margin-bottom:4px; text-align:left; flex:none; }
  .story-head { text-align:center; font-size:1.1rem; font-weight:700; margin:0 0 8px; color:#b45309; flex:none; }

  .control-bar {
    flex:none; display:flex; align-items:center; gap:14px;
    background:#fff; border-radius:20px; padding:10px 14px; margin-bottom:10px;
    box-shadow:0 4px 14px rgba(180,83,9,.10);
  }
  #btn-mic {
    flex:none; width:72px; height:72px; border-radius:50%; border:none; cursor:pointer;
    font-size:2rem; color:#fff;
    background:linear-gradient(145deg,#f472b6,#c084fc);
    box-shadow:0 6px 16px rgba(196,132,252,.45); transition:transform .12s;
  }
  #btn-mic:active { transform:scale(.94); }
  #btn-mic.listening { animation:micpulse 1.3s infinite; }
  @keyframes micpulse { 0%,100%{box-shadow:0 6px 16px rgba(196,132,252,.45);} 50%{box-shadow:0 0 0 14px rgba(244,114,182,.22);} }
  .control-txt { flex:1; min-width:0; }
  .mic-label { font-size:1rem; font-weight:700; color:#9d6b53; }
  #heard { font-size:.88rem; color:#b9a394; font-style:italic; min-height:1.2em; margin-top:2px;
           white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .track {
    flex:none; position:relative; height:122px; border-radius:20px; overflow:hidden;
    background:linear-gradient(180deg,#7dd3fc 0%,#bae6fd 48%,#86efac 48%,#4ade80 100%);
    box-shadow:inset 0 2px 8px rgba(0,0,0,.08); margin-bottom:6px;
  }
  .sun { position:absolute; top:6px; right:12px; font-size:1.6rem; }
  .cloud { position:absolute; font-size:1.4rem; opacity:.9; animation:drift linear infinite; }
  .cloud.c1 { top:6px; animation-duration:38s; }
  .cloud.c2 { top:26px; animation-duration:55s; animation-delay:-20s; font-size:1.1rem; }
  @keyframes drift { from{ left:-12%; } to{ left:104%; } }
  #pony { position:absolute; bottom:6px; left:0; font-size:2.7rem; transition:left .35s ease; z-index:3; }
  #pony.hop { animation:hop .3s ease; }
  #pony.hop-big { animation:hopbig .45s ease; }
  #pony.stumble { animation:stumble .4s ease; }
  @keyframes hop { 50%{ transform:translateY(-16px);} }
  @keyframes hopbig { 50%{ transform:translateY(-34px) rotate(-6deg);} }
  @keyframes stumble { 25%{transform:rotate(-12deg);} 75%{transform:rotate(10deg);} }
  #fly { position:absolute; top:36px; left:0; font-size:1.6rem; transition:left .25s linear; z-index:2; }
  .hurdle { position:absolute; bottom:8px; font-size:1.4rem; z-index:1; }
  .finish { position:absolute; right:4px; bottom:8px; font-size:2.1rem; }
  #spark { position:absolute; bottom:54px; font-size:1.2rem; display:none; z-index:3; }

  .race-info { flex:none; display:flex; justify-content:space-between; align-items:center; gap:8px;
               font-size:.95rem; color:#9d6b53; font-weight:700; margin-bottom:8px; padding:0 4px; }
  .quit { background:none; border:none; color:#b98a6f; font-size:.9rem; cursor:pointer; text-decoration:underline; }

  #text-display {
    position:relative; flex:1; min-height:0;
    background:#fff; border-radius:22px; padding:26px 20px;
    font-size:1.9rem; line-height:2.5; color:#3f2d20;
    box-shadow:0 6px 18px rgba(180,83,9,.12);
    overflow-y:auto;
  }
  .word { padding:2px 6px; border-radius:10px; opacity:.5; display:inline-block;
          transition:opacity .2s, transform .2s, background .2s; }
  .word.read   { opacity:1; background:#bbf7d0; color:#14532d; }
  .word.missed { opacity:1; background:#fed7aa; color:#7c2d12; }
  .word.current {
    opacity:1; background:#fde68a; transform:scale(1.18);
    box-shadow:0 0 0 3px #f59e0b; animation:pulse 1.2s infinite; font-weight:700;
  }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 3px #f59e0b;} 50%{box-shadow:0 0 0 7px #f59e0b55;} }
  .word.pause-ok::after   { content:'⏸'; font-size:.5em; color:#16a34a; margin-left:3px; vertical-align:super; }
  .word.pause-fast::after { content:'⏸'; font-size:.5em; color:#ea580c; margin-left:3px; vertical-align:super; opacity:.85; }

  .results-box { background:#fff; border-radius:22px; padding:26px 18px; text-align:center;
                 box-shadow:0 6px 18px rgba(180,83,9,.12); }
  .big-stars { font-size:3.4rem; letter-spacing:6px; margin:4px 0 12px; animation:pop .4s ease; }
  #res-message { font-size:1.2rem; font-weight:700; color:#5b3a29; margin-bottom:8px; }
  #res-race { font-size:1.05rem; color:#7c5843; margin-bottom:8px; }
  #res-pauses { font-size:1rem; color:#7c5843; margin-bottom:8px; }
  #res-speed { font-size:.92rem; color:#9d6b53; }
  #missed-words { margin-top:12px; font-size:1.02rem; color:#7c2d12; }
  .btn {
    display:inline-block; border:none; cursor:pointer; margin:8px 4px 0;
    padding:13px 24px; border-radius:999px; font-size:1.05rem; font-weight:700;
    background:#fbbf24; color:#78350f; box-shadow:0 4px 10px rgba(180,83,9,.25);
  }
  .btn.secondary { background:#fce7f3; color:#9d174d; }
  .warn { background:#fee2e2; color:#7f1d1d; padding:12px 16px; border-radius:14px;
          margin-top:14px; text-align:center; display:none; font-size:.98rem; }

  #confetti { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50; }
  #confetti span { position:absolute; top:-10%; font-size:1.6rem; animation:fall 2.6s ease-in forwards; }
  @keyframes fall { to { transform:translateY(115vh) rotate(360deg); } }

  /* ===== Grand écran : piste XXL + texte pleine hauteur ===== */
  @media (min-width: 900px){
    .screen { max-width:1100px; }
    .track { height:190px; }
    #pony { font-size:4.4rem; }
    #fly { font-size:2.7rem; top:60px; }
    .finish { font-size:3.4rem; }
    .hurdle { font-size:2.5rem; }
    .sun { font-size:2.4rem; }
    .cloud { font-size:2rem; }
    #spark { bottom:92px; font-size:2rem; }
    #btn-mic { width:86px; height:86px; font-size:2.4rem; }
    .mic-label { font-size:1.15rem; }
    #heard { font-size:1rem; }
    #text-display { font-size:2.25rem; padding:34px 40px; }
  }
</style>
</head>
<body>

<script>
/* ============ HISTOIRES (sans apostrophes ni traits d'union : contrainte reco vocale) ============ */
const STORIES = [
  { emoji:'🍎', title:'Caramel le poney', target:40, best:0,
    text:"Léa arrive à la ferme ce matin. Son poney Caramel attend près de la barrière. Elle le brosse doucement et lui donne une pomme bien rouge. Caramel remue la queue car il est content. Ensuite, Léa pose la selle et met son casque pour la promenade." },

  { emoji:'🗺️', title:'Le trésor du poney pirate', target:58, best:0,
    text:"Un matin, Léa trouve une vieille carte au fond de la grange. Elle montre un trésor caché près du grand chêne. Caramel porte un foulard rouge, comme un vrai pirate. Ils suivent le chemin, passent le pont de bois et comptent dix pas. Sous la terre, ils découvrent un coffre rempli de pommes dorées !" },
  { emoji:'❄️', title:'La neige magique', target:62, best:0,
    text:"Ce matin, la ferme est toute blanche. La neige tombe doucement du ciel gris. Caramel souffle des petits nuages de vapeur avec son nez. Léa lance une boule de neige, et le poney saute pour la toucher du bout du museau. Ensuite, ils dessinent des traces rigolotes dans la poudre blanche, puis ils rentrent bien au chaud." },
  { emoji:'🧚', title:'La fée des chevaux', target:66, best:0,
    text:"Cette nuit, une fée entre sans bruit dans la petite écurie. Elle touche la crinière de Caramel avec sa baguette magique. Le poney brille comme une étoile et des ailes dorées poussent sur son dos. Il vole très haut dans le ciel plein de nuages roses. Au matin, Léa trouve une plume dorée posée sur la paille." },
  { emoji:'🐉', title:'Le dragon gentil', target:70, best:0,
    text:"Au fond de la forêt vit un petit dragon vert nommé Pistache. Il est triste car tout le monde a peur de lui. Caramel avance doucement et lui offre une pomme. Le dragon sourit, et une petite flamme de joie sort de son nez. Depuis ce jour, Pistache garde la ferme la nuit, et il réchauffe la paille en hiver." },
  { emoji:'🌠', title:'La nuit des étoiles', target:74, best:0,
    text:"Ce soir, Léa installe une grande couverture dans le pré, tout près de Caramel. Le ciel est rempli de milliers de points brillants. Soudain, une étoile filante traverse la nuit comme une flèche de lumière. Léa ferme les yeux et fait un vœu secret. Le poney pose sa tête douce contre son épaule. Ensemble, ils comptent les étoiles très tard dans la nuit." }
];
const PACE_LABEL = t => t<=46 ? '🦋 lent' : t<=56 ? '🦋 moyen' : t<=66 ? '🦋 rapide' : '🦋 très rapide';
const HURDLES = [25, 50, 75];

/* ============ ÉTAT ============ */
let currentIdx = 0, wordEls = [], raceTimer = null,
    audioCtx = null, wakeLock = null, noResultTimer = null;
const state = { target:[], status:[], progress:0, startTime:null, running:false,
                finalTranscript:'', streak:0, flyDone:false, childFinished:false, gotAnyResult:false,
                wordTime:[], gaps:[], pauseResults:[] };

/* ============ MOTEUR VOCAL : Vosk intégré + secours Google ============ */
const VOSK_LIB = 'https://cdn.jsdelivr.net/npm/vosk-browser@0.0.8/dist/vosk.js';
const MODEL_URL = 'models/fr.tar.gz';
let voskModel = null, voskPromise = null, engine = null, webRecognition = null;
const audio = { ctx:null, stream:null, source:null, node:null, gain:null, recognizer:null };

function setVoiceStatus(txt){
  const a = document.getElementById('engine-status');
  if(a) a.textContent = txt;
}
function loadScript(src){
  return new Promise((res, rej)=>{
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = ()=>rej(new Error('script '+src));
    document.head.appendChild(s);
  });
}
async function getModelBlob(onPct){
  let cache = null;
  try{
    cache = await caches.open('vosk-model-v1');
    const hit = await cache.match(MODEL_URL);
    if(hit) return await hit.blob();
  }catch(_){}
  const resp = await fetch(MODEL_URL);
  if(!resp.ok) throw new Error('modele HTTP ' + resp.status);
  const total = +resp.headers.get('content-length') || 0;
  let blob;
  if(resp.body && total){
    const reader = resp.body.getReader();
    const chunks = []; let got = 0;
    for(;;){
      const {done, value} = await reader.read();
      if(done) break;
      chunks.push(value); got += value.length;
      onPct(Math.min(99, Math.round(100*got/total)));
    }
    blob = new Blob(chunks);
  } else {
    blob = await resp.blob();
  }
  if(cache){ try{ await cache.put(MODEL_URL, new Response(blob)); }catch(_){} }
  return blob;
}
function ensureVosk(){
  voskPromise = voskPromise || (async ()=>{
    try{
      if(typeof WebAssembly !== 'object') throw new Error('pas de WASM');
      setVoiceStatus('🎙 Moteur vocal : chargement...');
      await loadScript(VOSK_LIB);
      const blob = await getModelBlob(p=>{
        setVoiceStatus('🎙 Moteur vocal : téléchargement ' + p + ' % (1re fois seulement)');
        const l = document.getElementById('mic-label');
        if(l && !state.running) l.textContent = 'Téléchargement du moteur : ' + p + ' %';
      });
      const blobUrl = URL.createObjectURL(blob);
      try{ voskModel = await Vosk.createModel(blobUrl); }
      catch(e1){ voskModel = await Vosk.createModel(MODEL_URL); }
      setVoiceStatus('🎙 Moteur vocal prêt ✓ — la voix reste sur l\u2019appareil');
      return true;
    }catch(err){
      console.error('Vosk indisponible :', err);
      setVoiceStatus('🎙 Moteur intégré indisponible → reconnaissance Google en secours');
      return false;
    }
  })();
  return voskPromise;
}

async function startVoskEngine(){
  const stream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation:true, noiseSuppression:true, channelCount:1 }
  });
  audio.stream = stream;
  const Ctx = window.AudioContext || window.webkitAudioContext;
  try{ audio.ctx = new Ctx({ sampleRate: 16000 }); }  /* fréquence native du modèle */
  catch(_){ audio.ctx = new Ctx(); }
  try{ await audio.ctx.resume(); }catch(_){}
  /* Grammaire : la reco ne connaît que les mots de cette histoire → précision maximale */
  const vocab = [...new Set(state.target.map(w => w.raw.toLowerCase().replace(/[^\p{L}0-9]/gu, '')))]
    .filter(Boolean);
  const grammar = JSON.stringify(vocab.concat(['[unk]']));
  let rec;
  try{ rec = new voskModel.KaldiRecognizer(audio.ctx.sampleRate, grammar); }
  catch(e1){
    try{ rec = new voskModel.KaldiRecognizer(audio.ctx.sampleRate); }
    catch(e2){ rec = new voskModel.KaldiRecognizer(); }
  }
  audio.recognizer = rec;
  rec.on('result', (m)=>{
    if(!state.running) return;
    const t = (m && m.result && m.result.text) || '';
    if(t) state.finalTranscript += t + ' ';
    ingest(state.finalTranscript);
  });
  rec.on('partialresult', (m)=>{
    if(!state.running) return;
    const p = (m && m.result && m.result.partial) || '';
    ingest(state.finalTranscript + ' ' + p);
  });
  audio.source = audio.ctx.createMediaStreamSource(stream);
  audio.node = audio.ctx.createScriptProcessor(4096, 1, 1);
  audio.node.onaudioprocess = (e)=>{
    if(!state.running) return;
    try{ audio.recognizer.acceptWaveform(e.inputBuffer); }catch(_){}
  };
  audio.gain = audio.ctx.createGain();
  audio.gain.gain.value = 0;
  audio.source.connect(audio.node);
  audio.node.connect(audio.gain);
  audio.gain.connect(audio.ctx.destination);
}
function stopVoskEngine(){
  try{ if(audio.node){ audio.node.onaudioprocess = null; audio.node.disconnect(); } }catch(_){}
  try{ if(audio.source) audio.source.disconnect(); }catch(_){}
  try{ if(audio.gain) audio.gain.disconnect(); }catch(_){}
  try{ if(audio.recognizer && audio.recognizer.remove) audio.recognizer.remove(); }catch(_){}
  try{ if(audio.stream) audio.stream.getTracks().forEach(t=>t.stop()); }catch(_){}
  try{ if(audio.ctx) audio.ctx.close(); }catch(_){}
  audio.ctx = audio.stream = audio.source = audio.node = audio.gain = audio.recognizer = null;
}

const ERR_MSG = {
  'not-allowed': 'Micro refusé 😕 Icône 🔒 à côté de l\u2019adresse → Micro → Autoriser, puis recharge.',
  'service-not-allowed': 'La reconnaissance est bloquée ici. Ouvre le lien directement dans Chrome.',
  'network': 'La reconnaissance a besoin d\u2019internet. Vérifie la connexion 📶',
  'audio-capture': 'Aucun micro détecté sur cet appareil 🎙️',
  'language-not-supported': 'Le français n\u2019est pas disponible sur ce navigateur.'
};
function startWebSpeech(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ showCompat(); return false; }
  webRecognition = new SR();
  webRecognition.lang = 'fr-FR';
  webRecognition.continuous = true;
  webRecognition.interimResults = true;
  webRecognition.onresult = (e)=>{
    let interim = '';
    for(let i=e.resultIndex; i<e.results.length; i++){
      if(e.results[i].isFinal) state.finalTranscript += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript + ' ';
    }
    ingest(state.finalTranscript + ' ' + interim);
  };
  webRecognition.onerror = (e)=>{
    const msg = ERR_MSG[e.error];
    if(msg) document.getElementById('mic-label').textContent = msg;
  };
  webRecognition.onend = ()=>{
    if(state.running && engine === 'webspeech'){
      setTimeout(()=>{ try{ webRecognition.start(); }catch(_){} }, 200);
    }
  };
  try{ webRecognition.start(); }catch(_){ return false; }
  return true;
}
function stopWebSpeech(){
  if(webRecognition){ try{ webRecognition.stop(); }catch(_){} webRecognition = null; }
}

function ingest(allText){
  state.gotAnyResult = true;
  if(noResultTimer){ clearTimeout(noResultTimer); noResultTimer = null; }
  const tail = allText.trim().split(/\s+/).slice(-5).join(' ');
  document.getElementById('heard').textContent = tail ? '👂 ' + tail : '';
  processTranscript(allText);
}

/* ============ SONS ============ */
function beep(freq, dur=0.08, gain=0.12){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.frequency.value = freq; g.gain.value = gain;
    o.connect(g); g.connect(audioCtx.destination); o.start();
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.stop(audioCtx.currentTime + dur);
  }catch(_){}
}
function fanfare(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18,0.15), i*140)); }
function confetti(){
  const box = document.getElementById('confetti');
  const em = ['🎉','⭐','✨','💛','🌸'];
  for(let i=0;i<22;i++){
    const s = document.createElement('span');
    s.textContent = em[i % em.length];
    s.style.left = Math.random()*100 + 'vw';
    s.style.animationDelay = (Math.random()*0.7) + 's';
    box.appendChild(s);
    setTimeout(()=>s.remove(), 3600);
  }
}

/* ============ NAVIGATION ============ */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function renderHome(){
  const total = STORIES.reduce((a,s)=>a+s.best,0);
  document.getElementById('total-stars').textContent = '⭐ ' + total;
  const box = document.getElementById('story-list');
  box.innerHTML = '';
  STORIES.forEach((s,i)=>{
    const c = document.createElement('div');
    c.className = 'story-card';
    c.innerHTML = `<span class="emoji">${s.emoji}</span>
      <span class="mid"><span class="title">${s.title}</span><br>
      <span class="pace">${PACE_LABEL(s.target)}</span></span>
      <span class="stars">${'⭐'.repeat(s.best)}${'☆'.repeat(3-s.best)}</span>`;
    c.onclick = ()=>openStory(i);
    box.appendChild(c);
  });
}

/* ============ EXERCICE ============ */
function normalize(w){
  return w.toLowerCase().normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
}
/* tokens : mot + drapeau "pause" si ponctuation (y compris ponctuation détachée « ! » « : ») */
function tokenize(text){
  const parts = text.split(/\s+/).filter(Boolean);
  const out = [];
  for(const raw of parts){
    const norm = normalize(raw);
    if(!norm){
      if(out.length){ out[out.length-1].raw += ' ' + raw; out[out.length-1].pause = true; }
      continue;
    }
    out.push({ raw, norm, pause: /[,;:.!?…»]$/.test(raw) });
  }
  if(out.length) out[out.length-1].pause = false; /* dernier mot : rien à juger derrière */
  return out;
}
/* noms propres du texte (Léa...) : jamais vus en minuscule, majuscule en milieu de phrase ou répétés */
function computeProper(tokens){
  const capCount = {}, lowSeen = new Set(), midCap = new Set();
  tokens.forEach((w, idx)=>{
    const m = w.raw.match(/^[A-Za-zÀ-ÖØ-öø-ÿŒœ]+/);
    if(!m) return;
    if(/^[a-zà-öø-ÿœ]/.test(m[0])) lowSeen.add(w.norm);
    else {
      capCount[w.norm] = (capCount[w.norm]||0) + 1;
      const sentStart = idx===0 || /[.!?…]\s*$/.test(tokens[idx-1].raw);
      if(!sentStart) midCap.add(w.norm);
    }
  });
  const set = new Set();
  for(const nrm of Object.keys(capCount)){
    if(lowSeen.has(nrm)) continue;
    if(midCap.has(nrm) || capCount[nrm]>=2) set.add(nrm);
  }
  return set;
}
function median(arr){
  if(!arr.length) return 0;
  const s = [...arr].sort((a,b)=>a-b);
  return s[Math.floor(s.length/2)];
}
function openStory(i){
  stopAll();
  ensureVosk();
  currentIdx = i;
  const s = STORIES[i];
  Object.assign(state, { target:tokenize(s.text), progress:0, startTime:null, running:false,
    finalTranscript:'', streak:0, flyDone:false, childFinished:false, gotAnyResult:false,
    wordTime:[], gaps:[], pauseResults:[] });
  state.status = new Array(state.target.length).fill('pending');
  state.wordTime = new Array(state.target.length).fill(null);
  state.pauseResults = new Array(state.target.length).fill(null);
  state.proper = computeProper(state.target);

  document.getElementById('read-title').textContent = s.emoji + ' ' + s.title + ' — bats Zip 🦋 !';
  const disp = document.getElementById('text-display');
  disp.innerHTML = '';
  wordEls = state.target.map(w=>{
    const sp = document.createElement('span');
    sp.className = 'word'; sp.textContent = w.raw;
    disp.appendChild(sp); disp.appendChild(document.createTextNode(' '));
    return sp;
  });

  document.querySelectorAll('.hurdle').forEach(h=>h.remove());
  const track = document.querySelector('.track');
  HURDLES.forEach(p=>{
    const h = document.createElement('span');
    h.className = 'hurdle'; h.textContent = '🌿';
    h.style.left = (p*0.85) + '%';
    track.appendChild(h);
  });

  renderText(); scrollToCurrent(false);
  moveActor('pony', 0); moveActor('fly', 0);
  document.getElementById('streak').textContent = '🔥 série : 0';
  document.getElementById('timer').textContent = '⏱ 0 s';
  document.getElementById('mic-label').textContent = 'Appuie sur le micro et lis !';
  document.getElementById('heard').textContent = '';
  document.getElementById('btn-mic').classList.remove('listening');
  document.getElementById('btn-quit').style.display = 'none';
  document.getElementById('spark').style.display = 'none';
  show('screen-read');
}
function moveActor(id, pct){
  const left = (Math.min(pct,100) * 0.85) + '%';
  document.getElementById(id).style.left = left;
  if(id==='pony') document.getElementById('spark').style.left = left;
}
function scrollToCurrent(smooth=true){
  const el = wordEls[Math.min(state.progress, wordEls.length-1)];
  const box = document.getElementById('text-display');
  if(!el || !box) return;
  const target = el.offsetTop - box.clientHeight/2 + el.clientHeight/2;
  if(smooth) box.scrollTo({top:target, behavior:'smooth'});
  else box.scrollTop = target;
}

/* ============ DÉMARRAGE LECTURE ============ */
async function micTap(){
  if(state.running) return;
  beep(660, 0.06);
  const label = document.getElementById('mic-label');
  label.textContent = 'Préparation du micro... 🎙️';

  const voskOk = await ensureVosk();
  state.running = true;
  engine = null;

  if(voskOk){
    try{
      await startVoskEngine();
      engine = 'vosk';
    }catch(err){
      if(err && (err.name==='NotAllowedError' || err.name==='SecurityError')){
        label.textContent = ERR_MSG['not-allowed']; state.running = false; return;
      }
      if(err && err.name==='NotFoundError'){
        label.textContent = ERR_MSG['audio-capture']; state.running = false; return;
      }
      console.error('vosk start', err);
      stopVoskEngine();
    }
  }
  if(!engine){
    if(startWebSpeech()) engine = 'webspeech';
    else { state.running = false; return; }
  }

  label.textContent = 'Je t\u2019écoute... lis l\u2019histoire ! 🎧';
  document.getElementById('btn-mic').classList.add('listening');
  document.getElementById('btn-quit').style.display = 'inline-block';

  try{ if(navigator.wakeLock) navigator.wakeLock.request('screen').then(w=>wakeLock=w); }catch(_){}

  noResultTimer = setTimeout(()=>{
    if(!state.gotAnyResult)
      label.textContent = 'Je ne t\u2019entends pas 🤔 Parle plus fort, tout près du téléphone !';
  }, 7000);

  raceTimer = setInterval(()=>{
    if(!state.startTime) return;
    const elapsed = (Date.now() - state.startTime) / 1000;
    document.getElementById('timer').textContent = '⏱ ' + Math.round(elapsed) + ' s';
    const flyWords = (elapsed/60) * STORIES[currentIdx].target;
    const flyPct = 100 * flyWords / state.target.length;
    moveActor('fly', flyPct);
    if(flyPct >= 100 && !state.flyDone) state.flyDone = true;
  }, 250);
}
function showCompat(){
  const w = document.getElementById('compat-warn');
  w.style.display = 'block';
  w.innerHTML = 'Ce navigateur ne peut pas faire de reconnaissance vocale.<br>Essaie avec <b>Chrome</b> à jour 😊';
}

/* Alignement tolérant : fenêtre de 4 mots + Levenshtein ≤ 1 */
function processTranscript(spoken){
  const spokenWords = spoken.split(/\s+/).map(normalize).filter(Boolean);
  const n = state.target.length;
  const status = new Array(n).fill('pending');
  let ti = 0;
  for(const sw of spokenWords){
    if(ti >= n) break;
    let found = -1;
    if(sw === 'unk'){
      /* [unk] = mot hors vocabulaire de la grammaire (souvent un prénom comme Léa) :
         il ne peut valider qu'un nom propre attendu dans la fenêtre */
      for(let k=ti; k<Math.min(ti+4,n); k++){
        if(state.proper && state.proper.has(state.target[k].norm)){ found=k; break; }
      }
      if(found < 0) continue;
    } else {
      for(let k=ti; k<Math.min(ti+4,n); k++){
        if(isMatch(sw, state.target[k].norm)){ found=k; break; }
      }
    }
    if(found >= 0){
      for(let k=ti; k<found; k++) status[k]='missed';
      status[found]='read';
      ti = found+1;
    }
  }
  const prevProgress = state.progress;
  const prevMissed = state.status.filter(s=>s==='missed').length;
  state.status = status; state.progress = ti;
  if(!state.startTime && ti>0) state.startTime = Date.now();

  /* --- horodatage des mots validés + pauses de ponctuation --- */
  const now = Date.now();
  for(let k=prevProgress; k<ti; k++) state.wordTime[k] = now;
  for(let k=Math.max(1,prevProgress); k<ti; k++){
    const g = state.wordTime[k] - (state.wordTime[k-1] || state.wordTime[k]);
    if(g>120 && g<4000 && !state.target[k-1].pause) state.gaps.push(g);
  }
  if(state.gaps.length>40) state.gaps.splice(0, state.gaps.length-40);
  for(let k=0; k<ti-1; k++){
    if(!state.target[k].pause || state.pauseResults[k]!==null) continue;
    if(state.wordTime[k]==null || state.wordTime[k+1]==null) continue;
    if(state.status[k]!=='read'){ state.pauseResults[k]='skip'; continue; }
    const gap = state.wordTime[k+1] - state.wordTime[k];
    const base = median(state.gaps);
    const need = Math.min(Math.max(base ? base+280 : 800, 550), 2000);
    state.pauseResults[k] = gap >= need ? 'ok' : 'fast';
  }

  let streak = 0;
  for(let k=ti-1; k>=0 && status[k]==='read'; k--) streak++;
  state.streak = streak;
  document.getElementById('streak').textContent = '🔥 série : ' + streak;
  document.getElementById('spark').style.display = streak >= 5 ? 'block' : 'none';

  const pony = document.getElementById('pony');
  if(ti > prevProgress){
    const pctPrev = 100*prevProgress/n, pctNow = 100*ti/n;
    moveActor('pony', pctNow);
    const jumped = HURDLES.some(h => pctPrev < h && pctNow >= h);
    pony.classList.remove('hop','hop-big'); void pony.offsetWidth;
    pony.classList.add(jumped ? 'hop-big' : 'hop');
    if(jumped){ beep(880, 0.16, 0.13); if(navigator.vibrate) navigator.vibrate(40); }
    else beep(440 + Math.min(streak,10)*40, 0.05, 0.08);
    scrollToCurrent();
  }
  const nowMissed = status.filter(s=>s==='missed').length;
  if(nowMissed > prevMissed){
    pony.classList.remove('stumble'); void pony.offsetWidth; pony.classList.add('stumble');
    beep(180, 0.12, 0.06);
  }
  renderText();
  if(ti >= n && !state.childFinished){
    state.childFinished = true;
    setTimeout(finishExercise, 500);
  }
}
function isMatch(a,b){
  if(a===b) return true;
  const L = Math.min(a.length,b.length);
  if(L>=3 && levenshtein(a,b)<=1) return true;
  if(L>=7 && levenshtein(a,b)<=2) return true;
  return false;
}
function levenshtein(a,b){
  const m=a.length, n=b.length;
  const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=1;j<=n;j++) d[0][j]=j;
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    d[i][j]=Math.min(d[i-1][j]+1, d[i][j-1]+1, d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n];
}
function renderText(){
  state.target.forEach((_,i)=>{
    let cls = 'word ' + state.status[i];
    if(i===state.progress && state.running) cls += ' current';
    if(state.pauseResults[i]==='ok') cls += ' pause-ok';
    else if(state.pauseResults[i]==='fast') cls += ' pause-fast';
    wordEls[i].className = cls;
  });
}

/* ============ FIN & ÉTOILES ============ */
function finishExercise(){
  if(!state.running) return;
  stopAll();
  const elapsedMs = state.startTime ? (Date.now()-state.startTime) : 0;
  const minutes = Math.max(elapsedMs/60000, 0.05);
  const correct = state.status.filter(s=>s==='read').length;
  const mclm = Math.round(correct/minutes);
  const precision = Math.round(100*correct/state.target.length);
  const beatFly = state.childFinished && !state.flyDone;
  const stars = (precision>=90 && beatFly) ? 3 : (precision>=75) ? 2 : 1;

  STORIES[currentIdx].best = Math.max(STORIES[currentIdx].best, stars);
  if(stars === 3){ fanfare(); confetti(); } else beep(784, 0.2, 0.12);

  document.getElementById('res-stars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
  document.getElementById('res-race').textContent = beatFly
    ? '🏁 Caramel est arrivé avant Zip le papillon !'
    : '🦋 Zip est arrivé le premier cette fois... revanche ?';
  document.getElementById('res-message').textContent =
    stars===3 ? '🎉 Course parfaite ! Caramel est super fier de toi !' :
    stars===2 ? '💪 Très belle lecture ! Bats Zip pour la 3e étoile.' :
                '🌱 Bon début ! Relis cette histoire pour rattraper Zip.';

  const evald = state.pauseResults.filter(r=>r==='ok'||r==='fast').length;
  const okp = state.pauseResults.filter(r=>r==='ok').length;
  let ptxt = '';
  if(evald >= 2){
    ptxt = '⏸ Pauses à la ponctuation : ' + okp + ' / ' + evald;
    if(okp/evald >= 0.8 && evald >= 3) ptxt += ' — 🎭 Lecture expressive !';
    else if(okp/evald < 0.4) ptxt += ' — pense à respirer aux virgules et aux points 😊';
  }
  document.getElementById('res-pauses').textContent = ptxt;

  document.getElementById('res-speed').textContent = 'Tu as lu ' + mclm + ' mots par minute ⏱️';

  const missed = state.target.filter((_,i)=>state.status[i]!=='read').map(w=>w.raw);
  document.getElementById('missed-words').innerHTML = missed.length
    ? 'Mots à apprivoiser : <b>' + missed.slice(0,6).join(' · ') + '</b>'
    : '💯 Tu as lu tous les mots !';
  document.getElementById('btn-next').style.display =
    currentIdx < STORIES.length-1 ? 'inline-block' : 'none';
  show('screen-results');
}
function nextStory(){ openStory(Math.min(currentIdx+1, STORIES.length-1)); }
function stopAll(){
  state.running = false;
  stopWebSpeech();
  stopVoskEngine();
  engine = null;
  if(raceTimer){ clearInterval(raceTimer); raceTimer = null; }
  if(noResultTimer){ clearTimeout(noResultTimer); noResultTimer = null; }
  if(wakeLock){ try{ wakeLock.release(); }catch(_){} wakeLock = null; }
  const mic = document.getElementById('btn-mic');
  if(mic) mic.classList.remove('listening');
}

/* ============ COMPATIBILITÉ AU CHARGEMENT ============ */
const hasWASM = typeof WebAssembly === 'object';
const hasSR = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
if(!hasWASM && !hasSR) showCompat();
renderHome();
</script>
